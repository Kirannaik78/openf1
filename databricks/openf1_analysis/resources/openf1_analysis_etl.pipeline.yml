# The main pipeline for openf1_analysis

resources:
  pipelines:
    openf1_analysis_etl:
      name: openf1_analysis_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/openf1_analysis_etl"

      libraries:
        - glob:
            include: ../src/openf1_analysis_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
